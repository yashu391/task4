<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .task-input {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .filters {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filters button {
            background: #e2e8f0;
            color: #333;
        }

        .filters button.active {
            background: #667eea;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #667eea;
        }

        li.completed {
            text-decoration: line-through;
            opacity: 0.6;
            border-left-color: #28a745;
        }

        .task-details {
            flex: 1;
        }

        .task-date {
            font-size: 12px;
            color: #555;
        }

        .task-actions button {
            margin-left: 5px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .edit-btn { background: #ffc107; color: #000; }
        .delete-btn { background: #dc3545; }
        .complete-btn { background: #28a745; }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .task-input {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 To-Do List App</h1>

    <!-- Task Input -->
    <div class="task-input">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <input type="date" id="taskDate">
        <input type="time" id="taskTime">
        <button onclick="addTask()">Add</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <div>
            <button onclick="setFilter('all')" class="active">All</button>
            <button onclick="setFilter('pending')">Pending</button>
            <button onclick="setFilter('completed')">Completed</button>
        </div>
        <button onclick="clearAll()">Clear All</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>
    <p id="emptyMessage" class="empty">No tasks added yet.</p>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let filter = "all";

    function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
        const text = document.getElementById("taskInput").value.trim();
        const date = document.getElementById("taskDate").value;
        const time = document.getElementById("taskTime").value;

        if (text === "") {
            alert("Please enter a task!");
            return;
        }

        tasks.push({
            id: Date.now(),
            text,
            date,
            time,
            completed: false
        });

        document.getElementById("taskInput").value = "";
        document.getElementById("taskDate").value = "";
        document.getElementById("taskTime").value = "";

        saveTasks();
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById("taskList");
        const emptyMessage = document.getElementById("emptyMessage");
        list.innerHTML = "";

        let filteredTasks = tasks.filter(task => {
            if (filter === "pending") return !task.completed;
            if (filter === "completed") return task.completed;
            return true;
        });

        emptyMessage.style.display = filteredTasks.length ? "none" : "block";

        filteredTasks.forEach(task => {
            const li = document.createElement("li");
            li.className = task.completed ? "completed" : "";

            let dateTime = "";
            if (task.date || task.time) {
                dateTime = `<div class="task-date">📅 ${task.date || ""} ⏰ ${task.time || ""}</div>`;
            }

            li.innerHTML = `
                <div class="task-details">
                    <strong>${task.text}</strong>
                    ${dateTime}
                </div>
                <div class="task-actions">
                    <button class="complete-btn" onclick="toggleComplete(${task.id})">✔</button>
                    <button class="edit-btn" onclick="editTask(${task.id})">✏</button>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">🗑</button>
                </div>
            `;

            list.appendChild(li);
        });
    }

    function toggleComplete(id) {
        tasks = tasks.map(task =>
            task.id === id ? { ...task, completed: !task.completed } : task
        );
        saveTasks();
        renderTasks();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        const newText = prompt("Edit task:", task.text);

        if (newText !== null && newText.trim() !== "") {
            task.text = newText.trim();
            saveTasks();
            renderTasks();
        }
    }

    function deleteTask(id) {
        if (confirm("Are you sure you want to delete this task?")) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            renderTasks();
        }
    }

    function clearAll() {
        if (confirm("Clear all tasks?")) {
            tasks = [];
            saveTasks();
            renderTasks();
        }
    }

    function setFilter(selectedFilter) {
        filter = selectedFilter;
        document.querySelectorAll(".filters button").forEach(btn => {
            btn.classList.remove("active");
        });
        event.target.classList.add("active");
        renderTasks();
    }

    // Initial render
    renderTasks();
</script>

</body>
</html>
